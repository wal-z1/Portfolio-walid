<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>walid.</title>

		<!-- Preload theme before paint -->
		<script>
			(() => {
				const stored = localStorage.getItem("md3-theme");
				const prefersDark = window.matchMedia(
					"(prefers-color-scheme: dark)",
				).matches;
				const next = stored || (prefersDark ? "dark" : "light");
				document.documentElement.dataset.theme = next;
			})();
		</script>

		<meta name="description" content="Portfolio of walid." />

		<!-- Open Graph (for Discord, WhatsApp, LinkedIn, etc.) -->
		<meta property="og:title" content="walid." />
		<meta property="og:description" content="Portfolio of walid." />
		<meta
			property="og:image"
			content="https://walidb.vercel.app/Images/pfp.jpg" />
		<meta property="og:url" content="https://walidb.vercel.app/" />
		<meta property="og:type" content="website" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="walid." />
		<meta name="twitter:description" content="Portfolio of walid." />
		<meta
			name="twitter:image"
			content="https://walidb.vercel.app/Images/pfp.jpg" />

		<!-- Favicons -->
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="./public/Favicons/apple-touch-icon.png" />
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="./public/Favicons/favicon-32x32.png" />
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="./public/Favicons/favicon-16x16.png" />
		<link
			rel="icon"
			type="image/png"
			sizes="192x192"
			href="./public/Favicons/android-chrome-192x192.png" />
		<link
			rel="icon"
			type="image/png"
			sizes="512x512"
			href="./public/Favicons/android-chrome-512x512.png" />
		<link rel="shortcut icon" href="./public/Favicons/favicon.ico" />
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
